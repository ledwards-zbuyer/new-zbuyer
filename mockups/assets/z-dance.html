<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>zBuyer Z — ballet from the catwalk</title>
<meta name="robots" content="noindex">
<style>
  html,body{height:100%;margin:0;display:grid;place-items:center;background:#0A1426}
  .wrap{width:min(72vmin,520px)}
  svg{display:block;width:100%;height:auto}

  /* Reduced concept: the two halves of the z slide on PARALLEL tracks along
     the Z's own diagonal — the perpendicular seam between them never changes.
     The 7 glides in from upper-right, the L from lower-left; they lock into
     the logo Z, hold, then continue through and exit the way the other came.
     2s loop: 35% approach (ease-out), 30% pause, 35% departure (ease-in).
     A circle clip makes them emerge from / vanish into the stage rim. */
  .dancer{animation:2s linear infinite both}
  .w{animation-name:slideW}
  .b{animation-name:slideB}
  @keyframes slideW{
    0%  {transform:translate(96px,-174px);animation-timing-function:cubic-bezier(.16,.6,.3,1)}
    35%,65%{transform:translate(0,0)}
    65% {transform:translate(0,0);animation-timing-function:cubic-bezier(.7,.02,.84,.44)}
    100%{transform:translate(-96px,174px)}
  }
  @keyframes slideB{
    0%  {transform:translate(-96px,174px);animation-timing-function:cubic-bezier(.16,.6,.3,1)}
    35%,65%{transform:translate(0,0)}
    65% {transform:translate(0,0);animation-timing-function:cubic-bezier(.7,.02,.84,.44)}
    100%{transform:translate(96px,-174px)}
  }
  @media (prefers-reduced-motion:reduce){.dancer{animation:none}}
</style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 200 200" role="img" aria-label="zBuyer Z mark: two triangles dance in circles and settle into the Z">
      <defs>
        <radialGradient id="stage" cx="50%" cy="44%" r="68%">
          <stop offset="0%" stop-color="#172A4E"/>
          <stop offset="100%" stop-color="#0E1B33"/>
        </radialGradient>
      </defs>
      <circle cx="100" cy="100" r="96" fill="url(#stage)"/>
      <clipPath id="stageClip"><circle cx="100" cy="100" r="96"/></clipPath>
      <g clip-path="url(#stageClip)">
      <!-- the "7" -->
      <g class="dancer w">
        <polygon fill="#FFFFFF" points="40,42 128,42 64,158 39,158 95,68 40,68"/>
      </g>
      <!-- its 180°-twin, the "L" -->
      <g class="dancer b">
        <polygon fill="#3BA4F4" points="160,158 72,158 136,42 161,42 105,132 160,132"/>
      </g>
      </g>
    </svg>
  </div>
  <script>
    // Frame scrubber for GIF export / screenshots: ?t=SECONDS freezes the
    // animation at that moment (paused + negative delay).
    var t = new URLSearchParams(location.search).get("t");
    if (t !== null) {
      document.querySelectorAll(".dancer").forEach(function (el) {
        el.style.animationPlayState = "paused";
        el.style.animationDelay = (-parseFloat(t)) + "s";
      });
    }
  </script>
</body>
</html>
