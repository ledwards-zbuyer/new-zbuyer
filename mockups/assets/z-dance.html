<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>zBuyer Z — the meeting</title>
<meta name="robots" content="noindex">
<style>
  html,body{height:100%;margin:0;display:grid;place-items:center;background:#0A1426}
  .wrap{width:min(72vmin,520px)}
  svg{display:block;width:100%;height:auto}

  /* Palindrome cut: only the ENTRANCE is defined — walk in at the same
     35° tilt (pure translation, constant gap), spin once as a rigid pair,
     settle into the Z, hold. animation-direction:alternate then plays it
     backward, so they leave EXACTLY the way they came, and the loop repeats.
     4s per direction = 8s full cycle; hold at the Z spans the turnaround
     (~1.2s). The only rotation is the shared .pair group — independent
     rotation/overlap remain impossible. */
  .pair{transform-origin:100px 100px;animation:4s linear infinite alternate both;animation-name:spinPair}
  .piece{animation:4s linear infinite alternate both}
  .pw{animation-name:walkW}
  .pb{animation-name:walkB}

  @keyframes spinPair{
    0%  {transform:rotate(395deg)}
    38% {transform:rotate(395deg);animation-timing-function:cubic-bezier(.42,.05,.35,1)}
    88%,100%{transform:rotate(0deg)}
  }
  /* 0-12% holds them off-stage so the turnaround shows an empty stage
     (~1s across both directions) instead of an instant bounce. */
  @keyframes walkW{
    0%  {transform:translate(99px,-180px)}
    12% {transform:translate(99px,-180px);animation-timing-function:cubic-bezier(.2,.6,.3,1)}
    45%,100%{transform:translate(0,0)}
  }
  @keyframes walkB{
    0%  {transform:translate(-99px,180px)}
    12% {transform:translate(-99px,180px);animation-timing-function:cubic-bezier(.2,.6,.3,1)}
    45%,100%{transform:translate(0,0)}
  }
  @media (prefers-reduced-motion:reduce){.pair,.piece{animation:none}}
</style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 200 200" role="img" aria-label="zBuyer Z mark: two shapes walk up to each other, spin together, pause as the Z, and spin away">
      <defs>
        <radialGradient id="stage" cx="50%" cy="44%" r="68%">
          <stop offset="0%" stop-color="#172A4E"/>
          <stop offset="100%" stop-color="#0E1B33"/>
        </radialGradient>
        <clipPath id="stageClip"><circle cx="100" cy="100" r="96"/></clipPath>
      </defs>
      <circle id="stageBg" cx="100" cy="100" r="96" fill="url(#stage)"/>
      <g clip-path="url(#stageClip)">
        <g class="pair">
          <!-- the "7" -->
          <g class="piece pw">
            <polygon fill="#FFFFFF" points="40,42 128,42 64,158 39,158 95,68 40,68"/>
          </g>
          <!-- its 180°-twin, the "L" -->
          <g class="piece pb">
            <polygon fill="#3BA4F4" points="160,158 72,158 136,42 161,42 105,132 160,132"/>
          </g>
        </g>
      </g>
    </svg>
  </div>
  <script>
    // Frame scrubber for GIF export / screenshots: ?t=SECONDS freezes the
    // animation at that moment (paused + negative delay).
    var q = new URLSearchParams(location.search);
    // ?bare=1: arrows only — no stage, transparent page (for transparent
    // GIF/WebP export via --default-background-color=00000000).
    if (q.get("bare")) {
      document.body.style.background = "transparent";
      document.getElementById("stageBg").style.display = "none";
    }
    var t = q.get("t");
    if (t !== null) {
      document.querySelectorAll(".pair,.piece").forEach(function (el) {
        el.style.animationPlayState = "paused";
        el.style.animationDelay = (-parseFloat(t)) + "s";
      });
    }
  </script>
</body>
</html>
