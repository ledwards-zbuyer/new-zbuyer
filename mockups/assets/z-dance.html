<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>zBuyer Z — ballet from the catwalk</title>
<meta name="robots" content="noindex">
<style>
  html,body{height:100%;margin:0;display:grid;place-items:center;background:#0A1426}
  .wrap{width:min(72vmin,520px)}
  svg{display:block;width:100%;height:auto}

  /* Overhead ballet, waltz-phrased: the two halves of the z circle the stage
     twice coming IN (three lilts — the scale "breathes" up on the ONE of
     each measure, the catwalk view of a dancer rising), settle into the
     logo's Z with a small landing sway, HOLD the pose, then retrace their
     circles back OUT and rest offstage before the next repeat. The white 7
     travels a hair wider than the blue L (740° vs 700°) so the pair drifts
     like partners instead of spinning like a rigid logo; they always arrive
     together. Segment-eased keyframes give each measure its step. */
  .dancer{transform-origin:100px 100px;animation:10s cubic-bezier(.45,.05,.55,.95) infinite both}
  .w{animation-name:danceW}
  .b{animation-name:danceB}
  @keyframes danceW{
    0%  {transform:rotate(740deg) scale(1.32);opacity:0}
    5%  {opacity:1}
    10% {transform:rotate(560deg) scale(1.24)}
    13% {transform:rotate(500deg) scale(1.29)}
    18% {transform:rotate(330deg) scale(1.14)}
    21% {transform:rotate(280deg) scale(1.19)}
    26% {transform:rotate(110deg) scale(1.05)}
    29% {transform:rotate(70deg) scale(1.09)}
    33% {transform:rotate(9deg) scale(1.02)}
    36% {transform:rotate(-3deg) scale(.995)}
    39%,58%{transform:rotate(0deg) scale(1)}
    61% {transform:rotate(-7deg) scale(1.015)}
    67% {transform:rotate(90deg) scale(1.08)}
    70% {transform:rotate(140deg) scale(1.05)}
    75% {transform:rotate(320deg) scale(1.18)}
    78% {transform:rotate(370deg) scale(1.14)}
    84% {transform:rotate(600deg) scale(1.28);opacity:1}
    90%,100%{transform:rotate(740deg) scale(1.32);opacity:0}
  }
  @keyframes danceB{
    0%  {transform:rotate(700deg) scale(1.32);opacity:0}
    5%  {opacity:1}
    10% {transform:rotate(530deg) scale(1.24)}
    13% {transform:rotate(473deg) scale(1.29)}
    18% {transform:rotate(312deg) scale(1.14)}
    21% {transform:rotate(265deg) scale(1.19)}
    26% {transform:rotate(104deg) scale(1.05)}
    29% {transform:rotate(66deg) scale(1.09)}
    33% {transform:rotate(-8deg) scale(1.02)}
    36% {transform:rotate(3deg) scale(.995)}
    39%,58%{transform:rotate(0deg) scale(1)}
    61% {transform:rotate(6deg) scale(1.015)}
    67% {transform:rotate(85deg) scale(1.08)}
    70% {transform:rotate(132deg) scale(1.05)}
    75% {transform:rotate(302deg) scale(1.18)}
    78% {transform:rotate(350deg) scale(1.14)}
    84% {transform:rotate(567deg) scale(1.28);opacity:1}
    90%,100%{transform:rotate(700deg) scale(1.32);opacity:0}
  }
  @media (prefers-reduced-motion:reduce){.dancer{animation:none}}
</style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 200 200" role="img" aria-label="zBuyer Z mark: two triangles dance in circles and settle into the Z">
      <defs>
        <radialGradient id="stage" cx="50%" cy="44%" r="68%">
          <stop offset="0%" stop-color="#172A4E"/>
          <stop offset="100%" stop-color="#0E1B33"/>
        </radialGradient>
      </defs>
      <circle cx="100" cy="100" r="96" fill="url(#stage)"/>
      <!-- the "7" -->
      <g class="dancer w">
        <polygon fill="#FFFFFF" points="40,42 128,42 64,158 39,158 95,68 40,68"/>
      </g>
      <!-- its 180°-twin, the "L" -->
      <g class="dancer b">
        <polygon fill="#3BA4F4" points="160,158 72,158 136,42 161,42 105,132 160,132"/>
      </g>
    </svg>
  </div>
  <script>
    // Frame scrubber for GIF export / screenshots: ?t=SECONDS freezes the
    // animation at that moment (paused + negative delay).
    var t = new URLSearchParams(location.search).get("t");
    if (t !== null) {
      document.querySelectorAll(".dancer").forEach(function (el) {
        el.style.animationPlayState = "paused";
        el.style.animationDelay = (-parseFloat(t)) + "s";
      });
    }
  </script>
</body>
</html>
